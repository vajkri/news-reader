name: Fetch and Enrich

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-and-enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch articles
        run: |
          curl -f -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_URL }}/api/fetch"

      - name: Enrich articles
        run: |
          for i in $(seq 1 10); do
            RESPONSE=$(curl -f -s \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ vars.APP_URL }}/api/enrich?single")
            echo "Pass $i: $RESPONSE"
            ENRICHED=$(echo "$RESPONSE" | jq -r '.enriched // 0')
            if [ -z "$ENRICHED" ] || [ "$ENRICHED" -eq 0 ]; then
              echo "No more articles to enrich."
              break
            fi
          done
